<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 130 130" fill="none" role="img" aria-label="Colbisnes">
  <defs>
    <linearGradient id="a" x1="0" y1="0" x2="1" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%"   stop-color="#0B2D8C"/>
      <stop offset="100%" stop-color="#1F6BFF"/>
    </linearGradient>
    <filter id="s">
      <feDropShadow dx="0" dy="4" stdDeviation="10" flood-color="#1F6BFF" flood-opacity="0.32"/>
    </filter>
  </defs>

  <!-- Fondo redondeado -->
  <rect x="5" y="5" width="120" height="120" rx="28" fill="url(#a)" filter="url(#s)"/>

  <!-- Highlight superior -->
  <rect x="5" y="5" width="120" height="58" rx="28" fill="white" opacity="0.07"/>

  <!-- C bold arc — centro (65,65), radio 34 -->
  <path d="M 91 43 A 34 34 0 1 0 91 87"
        stroke="white" stroke-width="13" stroke-linecap="round"/>

  <!-- Checkmark -->
  <path d="M 40 65 L 53 79 L 76 50"
        stroke="white" stroke-width="10.5" stroke-linecap="round" stroke-linejoin="round"/>
</svg>

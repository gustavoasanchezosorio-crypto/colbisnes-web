<!-- N5: check de verificado = confianza/trato seguro. El amarillo significa "verificado". -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 540 92" fill="none">
  <text x="10" y="64"
    font-family="-apple-system,BlinkMacSystemFont,'Helvetica Neue',sans-serif"
    font-weight="800" font-size="62" letter-spacing="-3" fill="#1F6BFF">colbisnes</text>
  <!-- Sello circular amarillo con check azul = compra-venta verificada -->
  <circle cx="506" cy="40" r="20" fill="#FFCD00"/>
  <path d="M 497 41 L 503 48 L 516 33" stroke="#1F6BFF" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <text x="12" y="86"
    font-family="-apple-system,BlinkMacSystemFont,'Helvetica Neue',sans-serif"
    font-weight="500" font-size="12" letter-spacing="3.5" fill="#94A3B8">COLOMBIA · COMPRA · VENDE</text>
</svg>

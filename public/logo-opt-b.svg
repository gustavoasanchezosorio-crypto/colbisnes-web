<!-- OPCIÓN B: "El Trato" — dos personas cerrando un negocio, moderno y minimalista -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 120" fill="none">
  <defs>
    <linearGradient id="grad-b" x1="0" y1="0" x2="1" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#0A1F6B"/>
      <stop offset="100%" stop-color="#1A56DB"/>
    </linearGradient>
  </defs>

  <!-- Ícono: dos flechas en espejo formando un círculo (intercambio) -->
  <!-- Flecha superior (de izquierda a derecha, arco arriba) -->
  <!-- Flecha inferior (de derecha a izquierda, arco abajo) -->

  <!-- Fondo del ícono -->
  <rect x="4" y="4" width="112" height="112" rx="26" fill="url(#grad-b)"/>
  <rect x="4" y="4" width="112" height="56" rx="26" fill="rgba(255,255,255,0.06)"/>

  <!-- Flecha superior: semicírculo de izquierda hacia derecha por arriba -->
  <!-- Centro del ícono: (60,60). Radio del arco: 22 -->
  <!-- Flecha 1: M 38 60 A 22 22 0 0 1 82 60 — arco superior, de izq a der -->
  <path d="M 37 60 A 23 23 0 0 1 83 60"
    stroke="white" stroke-width="9" stroke-linecap="round" fill="none"/>
  <!-- Punta de flecha en (83,60) apuntando hacia abajo-derecha -->
  <path d="M 83 60 L 76 52 M 83 60 L 91 53"
    stroke="white" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Flecha 2: semicírculo de derecha hacia izquierda por abajo -->
  <path d="M 83 60 A 23 23 0 0 1 37 60"
    stroke="white" stroke-width="9" stroke-linecap="round" fill="none"/>
  <!-- Punta de flecha en (37,60) apuntando hacia arriba-izquierda -->
  <path d="M 37 60 L 44 68 M 37 60 L 29 67"
    stroke="white" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Wordmark -->
  <text x="138" y="63"
    font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif"
    font-weight="900" font-size="52" letter-spacing="-2.5"
    fill="#0B1628">COLBISNES</text>

  <!-- Línea decorativa bajo el wordmark -->
  <rect x="139" y="72" width="320" height="3" rx="2" fill="url(#grad-b)" opacity="0.3"/>

  <!-- Tagline -->
  <text x="140" y="92"
    font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif"
    font-weight="500" font-size="12.5" letter-spacing="3"
    fill="#94A3B8">COLOMBIA · COMPRA · VENDE</text>
</svg>

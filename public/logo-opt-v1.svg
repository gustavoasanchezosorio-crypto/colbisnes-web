<!-- V1: punto amarillo sobre la "i" (en vez de al final). Detalle sutil e inteligente. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 100" fill="none">
  <!-- colbisnes minúscula. La "i" pierde su punto normal y recibe uno amarillo -->
  <text x="10" y="68"
    font-family="-apple-system,BlinkMacSystemFont,'Helvetica Neue',sans-serif"
    font-weight="800" font-size="62" letter-spacing="-3" fill="#1F6BFF">colb<tspan fill="#1F6BFF">ı</tspan>snes</text>
  <!-- Punto amarillo sobre la i (4ta letra) -->
  <circle cx="222" cy="24" r="8" fill="#FFCD00"/>
  <text x="12" y="90"
    font-family="-apple-system,BlinkMacSystemFont,'Helvetica Neue',sans-serif"
    font-weight="500" font-size="12" letter-spacing="3.5" fill="#94A3B8">COLOMBIA · COMPRA · VENDE</text>
</svg>

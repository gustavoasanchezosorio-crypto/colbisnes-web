<!-- U: "App Tile" — ícono estilo fintech (Nubank/Wise/Revolut). Limpio y moderno. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 124" fill="none">
  <defs>
    <linearGradient id="gu" gradientUnits="userSpaceOnUse" x1="4" y1="4" x2="120" y2="120">
      <stop offset="0%" stop-color="#3B82F6"/>
      <stop offset="100%" stop-color="#1448A3"/>
    </linearGradient>
    <filter id="fu" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#1F6BFF" flood-opacity="0.4"/>
    </filter>
  </defs>
  <!-- Tile redondeado -->
  <rect x="4" y="4" width="116" height="116" rx="32" fill="url(#gu)" filter="url(#fu)"/>
  <!-- Brillo superior sutil -->
  <rect x="4" y="4" width="116" height="58" rx="32" fill="rgba(255,255,255,0.08)"/>
  <!-- C blanca geométrica -->
  <text x="60" y="83" text-anchor="middle"
    font-family="-apple-system,BlinkMacSystemFont,'Helvetica Neue',sans-serif"
    font-weight="900" font-size="74" letter-spacing="-3" fill="white">C</text>
  <!-- Punto amarillo de acento -->
  <circle cx="86" cy="40" r="9" fill="#FFCD00"/>
  <!-- Wordmark -->
  <text x="140" y="68"
    font-family="-apple-system,BlinkMacSystemFont,'Helvetica Neue',sans-serif"
    font-weight="800" font-size="46" letter-spacing="-1.5" fill="#1F6BFF">Colbisnes</text>
  <text x="142" y="91"
    font-family="-apple-system,BlinkMacSystemFont,'Helvetica Neue',sans-serif"
    font-weight="500" font-size="12" letter-spacing="2" fill="#94A3B8">Colombia · Compra · Vende</text>
</svg>

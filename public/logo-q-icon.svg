<!-- Q icon — El Anillo en formato cuadrado (favicon / app icon) -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none">
  <defs>
    <linearGradient id="gqi" gradientUnits="userSpaceOnUse" x1="10" y1="10" x2="110" y2="110">
      <stop offset="0%" stop-color="#1F6BFF"/>
      <stop offset="100%" stop-color="#1448A3"/>
    </linearGradient>
  </defs>
  <!-- Tile de fondo claro opcional -->
  <rect x="0" y="0" width="120" height="120" rx="26" fill="#FFFFFF"/>
  <!-- Anillo: gap a la derecha = C. Radio 40, circunf=251.3, 270°=188.5, gap=62.8 -->
  <circle cx="60" cy="60" r="40"
    stroke="url(#gqi)" stroke-width="20"
    stroke-dasharray="188.5 62.83"
    stroke-linecap="round"
    transform="rotate(45 60 60)"
    fill="none"/>
  <!-- Acento amarillo en la apertura -->
  <circle cx="60" cy="60" r="40"
    stroke="#FFCD00" stroke-width="5"
    stroke-dasharray="6 246"
    stroke-linecap="round"
    transform="rotate(45 60 60)"
    fill="none"/>
  <!-- B en el centro -->
  <text x="60" y="74" text-anchor="middle"
    font-family="-apple-system,BlinkMacSystemFont,'Helvetica Neue',sans-serif"
    font-weight="900" font-size="36" letter-spacing="-1" fill="#1448A3">B</text>
</svg>

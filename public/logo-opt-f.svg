<!-- F: "El Escudo" — confianza, protección, seguridad -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 124" fill="none">
  <defs>
    <linearGradient id="gf" x1="0" y1="0" x2="0" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#003893"/>
      <stop offset="100%" stop-color="#CE1126"/>
    </linearGradient>
    <filter id="sf"><feDropShadow dx="0" dy="4" stdDeviation="7" flood-color="#003893" flood-opacity="0.35"/></filter>
  </defs>
  <!-- Escudo: parte superior redondeada, punta abajo -->
  <path d="M 62 6 L 110 22 L 110 68 Q 62 118 14 68 L 14 22 Z"
    fill="url(#gf)" filter="url(#sf)"/>
  <!-- Highlight escudo -->
  <path d="M 62 6 L 110 22 L 110 44 Q 86 52 62 52 Q 38 52 14 44 L 14 22 Z"
    fill="rgba(255,255,255,0.1)"/>
  <!-- Checkmark blanco dentro del escudo -->
  <path d="M 36 62 L 52 78 L 88 46"
    stroke="white" stroke-width="9" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Wordmark -->
  <text x="136" y="62"
    font-family="-apple-system,BlinkMacSystemFont,'Helvetica Neue',sans-serif"
    font-weight="900" font-size="48" letter-spacing="-2" fill="#0B1628">COL</text>
  <text x="240" y="62"
    font-family="-apple-system,BlinkMacSystemFont,'Helvetica Neue',sans-serif"
    font-weight="900" font-size="48" letter-spacing="-2" fill="#003893">BISNES</text>
  <text x="137" y="85"
    font-family="-apple-system,BlinkMacSystemFont,'Helvetica Neue',sans-serif"
    font-weight="500" font-size="12" letter-spacing="2.5" fill="#94A3B8">COLOMBIA · COMPRA · VENDE</text>
</svg>

    </g>
  </g>
  <!-- Nombre pequeño debajo, espaciado -->
  <text x="280" y="178" text-anchor="middle"
    font-family="-apple-system,BlinkMacSystemFont,'Helvetica Neue',sans-serif"
    font-weight="800" font-size="34" letter-spacing="8" fill="#1F6BFF">COLBISNES</text>
</svg>

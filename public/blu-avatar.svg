<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" role="img" aria-label="Blu, asistente de Colbisnes">
  <defs>
    <linearGradient id="bluBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"  stop-color="#eaf4ff"/>
      <stop offset="100%" stop-color="#d7e9fb"/>
    </linearGradient>
    <!-- Azul metalizado de marca Colbisnes (mismo gradiente que lib/theme.ts -> metalBorder) -->
    <linearGradient id="bluPoint" x1="0.1" y1="0" x2="0.9" y2="1">
      <stop offset="0%"   stop-color="#5ccbf2"/>
      <stop offset="20%"  stop-color="#26a0e0"/>
      <stop offset="46%"  stop-color="#1466cc"/>
      <stop offset="70%"  stop-color="#0c47a3"/>
      <stop offset="100%" stop-color="#0a2e6b"/>
    </linearGradient>
    <linearGradient id="bluEye" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#5ccbf2"/>
      <stop offset="100%" stop-color="#0e56c0"/>
    </linearGradient>
    <filter id="bluShadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="5" stdDeviation="8" flood-color="#0a2e6b" flood-opacity="0.22"/>
    </filter>
  </defs>

  <!-- Fondo insignia redondeada -->
  <rect x="4" y="4" width="192" height="192" rx="46" fill="url(#bluBg)" filter="url(#bluShadow)"/>

  <!-- Orejas (color "punta" siamés en azul Colbisnes) -->
  <path d="M 40,80 Q 30,40 60,15 Q 82,45 76,78 Q 58,68 40,80 Z" fill="url(#bluPoint)"/>
  <path d="M 160,80 Q 170,40 140,15 Q 118,45 124,78 Q 142,68 160,80 Z" fill="url(#bluPoint)"/>
  <!-- Interior de orejas -->
  <path d="M 48,72 Q 44,48 60,30 Q 72,50 68,70 Q 58,64 48,72 Z" fill="#f3f9ff"/>
  <path d="M 152,72 Q 156,48 140,30 Q 128,50 132,70 Q 142,64 152,72 Z" fill="#f3f9ff"/>

  <!-- Cabeza (cuerpo crema/blanco del gato siames) -->
  <path d="M 100,58 C 138,58 166,84 166,120 C 166,152 140,174 100,174 C 60,174 34,152 34,120 C 34,84 62,58 100,58 Z" fill="#ffffff"/>

  <!-- Mascara facial siamesa en azul Colbisnes -->
  <path d="M 66,84 C 74,68 126,68 134,84 C 140,96 138,112 128,118 C 122,108 78,108 72,118 C 62,112 60,96 66,84 Z" fill="url(#bluPoint)"/>

  <!-- Rubor mejillas -->
  <ellipse cx="62" cy="120" rx="9" ry="5.5" fill="#ffb4c6" opacity="0.35"/>
  <ellipse cx="138" cy="120" rx="9" ry="5.5" fill="#ffb4c6" opacity="0.35"/>

  <!-- Ojo izquierdo -->
  <ellipse cx="78" cy="104" rx="13" ry="11" fill="#eaf6ff"/>
  <circle cx="78" cy="105" r="8" fill="url(#bluEye)"/>
  <ellipse cx="78" cy="106.5" rx="3.4" ry="5.2" fill="#0a2e6b"/>
  <circle cx="81.2" cy="100.8" r="2.2" fill="#ffffff"/>

  <!-- Ojo derecho -->
  <ellipse cx="122" cy="104" rx="13" ry="11" fill="#eaf6ff"/>
  <circle cx="122" cy="105" r="8" fill="url(#bluEye)"/>
  <ellipse cx="122" cy="106.5" rx="3.4" ry="5.2" fill="#0a2e6b"/>
  <circle cx="125.2" cy="100.8" r="2.2" fill="#ffffff"/>

  <!-- Nariz -->
  <path d="M 94,122 Q 100,116.5 106,122 Q 106,128 100,132 Q 94,128 94,122 Z" fill="#C79A2E"/>

  <!-- Boca -->
  <path d="M 100,132 L 100,137" stroke="#33465c" stroke-width="2.6" stroke-linecap="round" fill="none"/>
  <path d="M 82,140 Q 100,151 100,137 Q 100,151 118,140" stroke="#33465c" stroke-width="3" stroke-linecap="round" fill="none"/>

  <!-- Bigotes -->
  <line x1="62" y1="121" x2="28" y2="114" stroke="#c7d4e5" stroke-width="2.2" stroke-linecap="round"/>
  <line x1="63" y1="129" x2="26" y2="129" stroke="#c7d4e5" stroke-width="2.2" stroke-linecap="round"/>
  <line x1="62" y1="137" x2="28" y2="144" stroke="#c7d4e5" stroke-width="2.2" stroke-linecap="round"/>
  <line x1="138" y1="121" x2="172" y2="114" stroke="#c7d4e5" stroke-width="2.2" stroke-linecap="round"/>
  <line x1="137" y1="129" x2="174" y2="129" stroke="#c7d4e5" stroke-width="2.2" stroke-linecap="round"/>
  <line x1="138" y1="137" x2="172" y2="144" stroke="#c7d4e5" stroke-width="2.2" stroke-linecap="round"/>

  <!-- Collar con cascabel dorado -->
  <path d="M 74,159 Q 100,172 126,159" stroke="url(#bluPoint)" stroke-width="7" stroke-linecap="round" fill="none"/>
  <circle cx="100" cy="170" r="6.2" fill="#C79A2E"/>
  <circle cx="100" cy="170" r="6.2" fill="none" stroke="#8a6a1a" stroke-width="0.8"/>
  <line x1="97" y1="170" x2="103" y2="170" stroke="#8a6a1a" stroke-width="1"/>
  <circle cx="98" cy="168" r="1.1" fill="#f3e2ad"/>
</svg>

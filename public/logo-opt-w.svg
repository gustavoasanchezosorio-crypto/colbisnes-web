<!-- W: "La Burbuja" — un marketplace es conversación. Burbuja de chat = trato entre personas. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 124" fill="none">
  <defs>
    <linearGradient id="gw" gradientUnits="userSpaceOnUse" x1="8" y1="8" x2="116" y2="110">
      <stop offset="0%" stop-color="#3B82F6"/>
      <stop offset="100%" stop-color="#1448A3"/>
    </linearGradient>
    <filter id="fw" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="5" stdDeviation="9" flood-color="#1F6BFF" flood-opacity="0.38"/>
    </filter>
  </defs>
  <!-- Burbuja de chat redondeada con cola inferior-izquierda -->
  <path d="M 30 12 H 96 Q 116 12 116 32 V 78 Q 116 98 96 98 H 52 L 28 116 L 32 98 H 30 Q 14 98 14 78 V 32 Q 14 12 30 12 Z"
    fill="url(#gw)" filter="url(#fw)"/>
  <!-- cb en blanco dentro de la burbuja -->
  <text x="62" y="68" text-anchor="middle"
    font-family="-apple-system,BlinkMacSystemFont,'Helvetica Neue',sans-serif"
    font-weight="900" font-size="42" letter-spacing="-2" fill="white">cb</text>
  <!-- Punto amarillo (online / activo) -->
  <circle cx="100" cy="28" r="8" fill="#FFCD00"/>
  <!-- Wordmark -->
  <text x="140" y="62"
    font-family="-apple-system,BlinkMacSystemFont,'Helvetica Neue',sans-serif"
    font-weight="800" font-size="46" letter-spacing="-1.5" fill="#1F6BFF">Colbisnes</text>
  <text x="142" y="86"
    font-family="-apple-system,BlinkMacSystemFont,'Helvetica Neue',sans-serif"
    font-weight="500" font-size="12" letter-spacing="2" fill="#94A3B8">Colombia · Compra · Vende</text>
</svg>

<!-- X: "La Sonrisa" — swoosh/sonrisa bajo el wordmark (estilo Amazon: confianza + de A a Z). -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 120" fill="none">
  <defs>
    <linearGradient id="gx" gradientUnits="userSpaceOnUse" x1="20" y1="80" x2="420" y2="80">
      <stop offset="0%" stop-color="#1F6BFF"/>
      <stop offset="100%" stop-color="#FFCD00"/>
    </linearGradient>
  </defs>
  <!-- colbisnes wordmark -->
  <text x="20" y="62"
    font-family="-apple-system,BlinkMacSystemFont,'Helvetica Neue',sans-serif"
    font-weight="800" font-size="56" letter-spacing="-2.5" fill="#1F6BFF">colbisnes</text>
  <!-- Sonrisa: arco que va de la c a la s (azul → amarillo) con punta de flecha -->
  <path d="M 28 84 Q 215 116 405 84"
    stroke="url(#gx)" stroke-width="7" stroke-linecap="round" fill="none"/>
  <!-- Punta de flecha al final del swoosh -->
  <path d="M 405 84 L 392 78 M 405 84 L 396 95"
    stroke="#FFCD00" stroke-width="7" stroke-linecap="round" fill="none"/>
  <!-- Tagline -->
  <text x="22" y="108"
    font-family="-apple-system,BlinkMacSystemFont,'Helvetica Neue',sans-serif"
    font-weight="500" font-size="11" letter-spacing="3" fill="#94A3B8">COLOMBIA · COMPRA · VENDE</text>
</svg>

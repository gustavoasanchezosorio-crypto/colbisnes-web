<!-- OPCIÓN A: "La Tricolor" — bandera colombiana integrada en el ícono -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 120" fill="none">
  <defs>
    <clipPath id="clip-a">
      <rect x="4" y="4" width="112" height="112" rx="24"/>
    </clipPath>
  </defs>

  <!-- Fondo del ícono con los colores de la bandera -->
  <rect x="4" y="4" width="112" height="112" rx="24" fill="#FCD116"/>
  <rect x="4" y="60" width="112" height="56" rx="0" fill="#003893" clip-path="url(#clip-a)"/>
  <rect x="4" y="88" width="112" height="28" rx="0" fill="#CE1126" clip-path="url(#clip-a)"/>

  <!-- Highlight sutil -->
  <rect x="4" y="4" width="112" height="112" rx="24" fill="rgba(0,0,0,0.04)"/>

  <!-- CB en blanco, bold -->
  <text x="60" y="72"
    text-anchor="middle"
    font-family="-apple-system, BlinkMacSystemFont, 'Arial Black', sans-serif"
    font-weight="900" font-size="48" letter-spacing="-3"
    fill="white"
    style="paint-order:stroke; stroke:rgba(0,0,0,0.12); stroke-width:3">CB</text>

  <!-- Wordmark -->
  <text x="138" y="66"
    font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif"
    font-weight="900" font-size="52" letter-spacing="-2.5"
    fill="#0B1628">COLBISNES</text>

  <!-- Tagline -->
  <text x="140" y="92"
    font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif"
    font-weight="500" font-size="12.5" letter-spacing="3"
    fill="#94A3B8">COLOMBIA · COMPRA · VENDE</text>
</svg>

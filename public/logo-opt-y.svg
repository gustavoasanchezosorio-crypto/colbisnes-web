<!-- Y: "El Paquete" — caja/paquete isométrico minimal = comercio/envío. Ícono + wordmark. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 124" fill="none">
  <defs>
    <linearGradient id="gy-top" gradientUnits="userSpaceOnUse" x1="20" y1="20" x2="100" y2="40">
      <stop offset="0%" stop-color="#3B82F6"/>
      <stop offset="100%" stop-color="#1F6BFF"/>
    </linearGradient>
    <linearGradient id="gy-left" gradientUnits="userSpaceOnUse" x1="20" y1="50" x2="60" y2="100">
      <stop offset="0%" stop-color="#1F6BFF"/>
      <stop offset="100%" stop-color="#1448A3"/>
    </linearGradient>
    <linearGradient id="gy-right" gradientUnits="userSpaceOnUse" x1="60" y1="50" x2="100" y2="100">
      <stop offset="0%" stop-color="#1448A3"/>
      <stop offset="100%" stop-color="#0E3170"/>
    </linearGradient>
  </defs>
  <!-- Caja isométrica: tapa, cara izquierda, cara derecha -->
  <!-- Tapa superior (rombo) -->
  <path d="M 60 18 L 102 40 L 60 62 L 18 40 Z" fill="url(#gy-top)"/>
  <!-- Cara izquierda -->
  <path d="M 18 40 L 60 62 L 60 110 L 18 88 Z" fill="url(#gy-left)"/>
  <!-- Cara derecha -->
  <path d="M 102 40 L 60 62 L 60 110 L 102 88 Z" fill="url(#gy-right)"/>
  <!-- Cinta amarilla sobre la tapa -->
  <path d="M 60 18 L 102 40 L 60 62 L 18 40 Z" fill="none" stroke="#FFCD00" stroke-width="3" opacity="0.9"/>
  <path d="M 39 29 L 81 51 M 81 29 L 39 51" stroke="#FFCD00" stroke-width="2.5" opacity="0.55"/>
  <!-- Wordmark -->
  <text x="128" y="60"
    font-family="-apple-system,BlinkMacSystemFont,'Helvetica Neue',sans-serif"
    font-weight="800" font-size="44" letter-spacing="-1.5" fill="#1F6BFF">Colbisnes</text>
  <text x="130" y="84"
    font-family="-apple-system,BlinkMacSystemFont,'Helvetica Neue',sans-serif"
    font-weight="500" font-size="12" letter-spacing="2" fill="#94A3B8">Colombia · Compra · Vende</text>
</svg>
